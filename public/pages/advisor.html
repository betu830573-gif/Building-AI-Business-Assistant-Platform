<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Crop Advisor - KrishiMitra</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-success sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">🌾 KrishiMitra AI</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="dashboard.html">Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link active" href="advisor.html">Crop Advisor</a></li>
                    <li class="nav-item"><a class="nav-link" href="disease.html">Disease Detection</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Content -->
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card shadow border-0">
                    <div class="card-body p-5">
                        <h2 class="text-success fw-bold text-center mb-4">🌿 AI Crop Advisor</h2>
                        <p class="text-muted text-center mb-4">Enter your details below to get personalized farming advice powered by AI.</p>
                        
                        <form id="advisorForm">
                            <div class="mb-3">
                                <label for="crop" class="form-label fw-semibold">Crop Name</label>
                                <input type="text" class="form-control form-control-lg" id="crop" placeholder="e.g., Wheat, Rice, Soybean" required>
                            </div>
                            <div class="mb-3">
                                <label for="location" class="form-label fw-semibold">Your Location</label>
                                <input type="text" class="form-control form-control-lg" id="location" placeholder="e.g., Punjab, Maharashtra" required>
                            </div>
                            <div class="mb-4">
                                <label for="season" class="form-label fw-semibold">Current Season</label>
                                <select class="form-select form-select-lg" id="season" required>
                                    <option value="" disabled selected>Select Season...</option>
                                    <option value="Kharif">Kharif (Monsoon)</option>
                                    <option value="Rabi">Rabi (Winter)</option>
                                    <option value="Zaid">Zaid (Summer)</option>
                                </select>
                            </div>
                            <div class="d-grid">
                                <button type="submit" class="btn btn-success btn-lg rounded-pill" id="submitBtn">Get AI Advice</button>
                            </div>
                        </form>

                        <!-- Results Section -->
                        <div id="resultSection" class="mt-5 d-none">
                            <h4 class="fw-bold text-primary mb-3">AI Recommendation:</h4>
                            <div class="p-4 bg-light rounded" id="aiResponse" style="white-space: pre-line;">
                                <!-- AI output goes here -->
                            </div>
                        </div>
                        
                        <!-- Loading Spinner -->
                        <div id="loading" class="text-center mt-4 d-none">
                            <div class="spinner-border text-success" role="status">
                                <span class="visually-hidden">Loading...</span>
                            </div>
                            <p class="mt-2 text-muted">Analyzing the best practices for you...</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.getElementById('advisorForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const crop = document.getElementById('crop').value;
            const location = document.getElementById('location').value;
            const season = document.getElementById('season').value;

            const submitBtn = document.getElementById('submitBtn');
            const loading = document.getElementById('loading');
            const resultSection = document.getElementById('resultSection');
            const aiResponse = document.getElementById('aiResponse');

            // UI states
            submitBtn.disabled = true;
            resultSection.classList.add('d-none');
            loading.classList.remove('d-none');

            try {
                const response = await fetch('/api/crop-advisor', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ crop, location, season })
                });
                
                const data = await response.json();
                
                if(response.ok) {
                    aiResponse.innerHTML = data.advice.replace(/\n/g, '<br>');
                    resultSection.classList.remove('d-none');
                } else {
                    aiResponse.innerHTML = `<span class="text-danger">Error: ${data.error}</span>`;
                    resultSection.classList.remove('d-none');
                }
            } catch (error) {
                aiResponse.innerHTML = `<span class="text-danger">Failed to connect to the server. Is it running?</span>`;
                resultSection.classList.remove('d-none');
            } finally {
                submitBtn.disabled = false;
                loading.classList.add('d-none');
            }
        });
    </script>
</body>
</html>
