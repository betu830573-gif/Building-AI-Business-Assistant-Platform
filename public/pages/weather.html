<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Updates - KrishiMitra</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-success sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">🌾 KrishiMitra AI</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="dashboard.html">Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link" href="advisor.html">Crop Advisor</a></li>
                    <li class="nav-item"><a class="nav-link" href="disease.html">Disease Detection</a></li>
                    <li class="nav-item"><a class="nav-link active" href="weather.html">Weather</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Content -->
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow border-0">
                    <div class="card-body p-5">
                        <h2 class="text-success fw-bold text-center mb-4">⛅ Weather Updates</h2>
                        <p class="text-muted text-center mb-4">Check current weather conditions for better farm planning.</p>
                        
                        <form id="weatherForm">
                            <div class="input-group mb-3">
                                <input type="text" class="form-control form-control-lg" id="cityInput" placeholder="Enter your city/village name" required>
                                <button class="btn btn-success" type="submit" id="searchBtn">Search</button>
                            </div>
                        </form>

                        <!-- Weather Results -->
                        <div id="weatherResult" class="mt-4 text-center d-none">
                            <h3 class="fw-bold" id="cityName"></h3>
                            <div class="display-1 text-primary fw-bold" id="temperature">--°C</div>
                            <h5 class="text-muted mt-2" id="description">--</h5>
                            <div class="row mt-4">
                                <div class="col-6">
                                    <p class="mb-1 text-muted">Humidity</p>
                                    <h5 class="fw-bold" id="humidity">--%</h5>
                                </div>
                                <div class="col-6">
                                    <p class="mb-1 text-muted">Wind Speed</p>
                                    <h5 class="fw-bold" id="wind">-- m/s</h5>
                                </div>
                            </div>
                        </div>

                        <!-- Loading Spinner -->
                        <div id="loading" class="text-center mt-4 d-none">
                            <div class="spinner-border text-success" role="status">
                                <span class="visually-hidden">Loading...</span>
                            </div>
                        </div>
                        
                        <!-- Error Message -->
                        <div id="errorMsg" class="text-danger text-center mt-3 d-none"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.getElementById('weatherForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const city = document.getElementById('cityInput').value;

            const searchBtn = document.getElementById('searchBtn');
            const loading = document.getElementById('loading');
            const weatherResult = document.getElementById('weatherResult');
            const errorMsg = document.getElementById('errorMsg');

            searchBtn.disabled = true;
            weatherResult.classList.add('d-none');
            errorMsg.classList.add('d-none');
            loading.classList.remove('d-none');

            try {
                const response = await fetch('/api/weather', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ location: city })
                });
                
                const data = await response.json();
                
                if(response.ok && data.weather) {
                    document.getElementById('cityName').textContent = data.weather.name + ", " + data.weather.sys.country;
                    document.getElementById('temperature').textContent = Math.round(data.weather.main.temp) + "°C";
                    document.getElementById('description').textContent = data.weather.weather[0].description.toUpperCase();
                    document.getElementById('humidity').textContent = data.weather.main.humidity + "%";
                    document.getElementById('wind').textContent = data.weather.wind.speed + " m/s";
                    
                    weatherResult.classList.remove('d-none');
                } else {
                    errorMsg.textContent = "Error: " + (data.error || "City not found.");
                    errorMsg.classList.remove('d-none');
                }
            } catch (error) {
                errorMsg.textContent = "Failed to connect to the server.";
                errorMsg.classList.remove('d-none');
            } finally {
                searchBtn.disabled = false;
                loading.classList.add('d-none');
            }
        });
    </script>
</body>
</html>
