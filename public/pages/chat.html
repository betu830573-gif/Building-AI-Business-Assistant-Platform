<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Voice Assistant - KrishiMitra</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        .chat-container {
            height: 400px;
            overflow-y: auto;
            border: 1px solid #e0e0e0;
            border-radius: 10px;
            padding: 1rem;
            background-color: #f9f9f9;
        }
        .message {
            margin-bottom: 1rem;
            padding: 10px 15px;
            border-radius: 20px;
            max-width: 75%;
            word-wrap: break-word;
        }
        .message.user {
            background-color: var(--primary-color);
            color: white;
            margin-left: auto;
            border-bottom-right-radius: 0;
        }
        .message.ai {
            background-color: #e0e0e0;
            color: black;
            margin-right: auto;
            border-bottom-left-radius: 0;
        }
        .mic-btn {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            transition: all 0.3s ease;
        }
        .mic-btn.recording {
            animation: pulse 1.5s infinite;
            background-color: #dc3545 !important;
            border-color: #dc3545 !important;
        }
        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(220, 53, 69, 0.7); }
            70% { transform: scale(1.1); box-shadow: 0 0 0 15px rgba(220, 53, 69, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(220, 53, 69, 0); }
        }
    </style>
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-success sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">🌾 KrishiMitra AI</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="dashboard.html">Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link" href="advisor.html">Crop Advisor</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Content -->
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card shadow border-0">
                    <div class="card-body p-4">
                        <h2 class="text-success fw-bold text-center mb-2">🎙️ Hindi Voice Assistant</h2>
                        <p class="text-muted text-center mb-4">बोलकर अपना सवाल पूछें (Ask your question in Hindi)</p>
                        
                        <div class="chat-container mb-4" id="chatBox">
                            <div class="message ai">
                                नमस्ते! मैं आपका कृषि मित्र हूँ। आप मुझसे खेती के बारे में कोई भी सवाल पूछ सकते हैं।
                            </div>
                        </div>
                        
                        <div class="d-flex justify-content-center align-items-center gap-3">
                            <button class="btn btn-success mic-btn shadow" id="micBtn">
                                🎤
                            </button>
                            <span id="statusText" class="text-muted">Tap to speak...</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const micBtn = document.getElementById('micBtn');
        const statusText = document.getElementById('statusText');
        const chatBox = document.getElementById('chatBox');

        // Check for browser support
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        let recognition;

        if (SpeechRecognition) {
            recognition = new SpeechRecognition();
            recognition.lang = 'hi-IN'; // Hindi
            recognition.interimResults = false;
            recognition.maxAlternatives = 1;

            recognition.onstart = () => {
                micBtn.classList.add('recording');
                statusText.textContent = "Listening... (सुन रहा हूँ...)";
            };

            recognition.onspeechend = () => {
                micBtn.classList.remove('recording');
                statusText.textContent = "Processing... (प्रसंस्करण कर रहा हूँ...)";
                recognition.stop();
            };

            recognition.onresult = async (event) => {
                const transcript = event.results[0][0].transcript;
                appendMessage(transcript, 'user');
                await fetchAIResponse(transcript);
            };

            recognition.onerror = (event) => {
                micBtn.classList.remove('recording');
                statusText.textContent = "Error occurred in recognition: " + event.error;
            };
        } else {
            statusText.textContent = "Speech Recognition is not supported in this browser.";
            micBtn.disabled = true;
        }

        micBtn.addEventListener('click', () => {
            if(recognition) {
                recognition.start();
            }
        });

        function appendMessage(text, sender) {
            const msgDiv = document.createElement('div');
            msgDiv.classList.add('message', sender);
            msgDiv.textContent = text;
            chatBox.appendChild(msgDiv);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        async function fetchAIResponse(userText) {
            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: userText })
                });
                
                const data = await response.json();
                if(response.ok) {
                    appendMessage(data.reply, 'ai');
                    speakHindi(data.reply);
                } else {
                    appendMessage("माफ़ करें, कोई समस्या आई। (Sorry, an error occurred.)", 'ai');
                }
            } catch (error) {
                appendMessage("सर्वर से कनेक्ट नहीं हो सका। (Could not connect to server.)", 'ai');
            }
            statusText.textContent = "Tap to speak...";
        }

        function speakHindi(text) {
            if ('speechSynthesis' in window) {
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'hi-IN';
                window.speechSynthesis.speak(utterance);
            }
        }
    </script>
</body>
</html>
